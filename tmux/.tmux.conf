# Prefix: Ctrl-Space
unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

# Keep tmux responsive.
set-option -sg escape-time 10
set-option -g focus-events on

# Start windows and panes at 1.
set-option -g base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Status bar at the top.
set-option -g status-position top

# Vi-style copy mode and pane movement.
set-window-option -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Vi-style window movement.
bind-key H previous-window
bind-key L next-window

# Easier pane splitting from the current directory.
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"

# Resize panes with repeated prefix + hjkl.
bind-key -r C-h resize-pane -L 5
bind-key -r C-j resize-pane -D 5
bind-key -r C-k resize-pane -U 5
bind-key -r C-l resize-pane -R 5

# Quality-of-life defaults.
set-option -g mouse on
set-option -g history-limit 50000
bind-key r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

# Plugin manager.
set-option -g @plugin 'tmux-plugins/tpm'
set-option -g @plugin 'dracula/tmux'

# Dracula theme options.
set-option -g @dracula-show-powerline true
set-option -g @dracula-show-left-icon session
set-option -g @dracula-plugins "git cpu-usage ram-usage time"
set-option -g @dracula-military-time true

# Keep this at the bottom of the file.
run '~/.tmux/plugins/tpm/tpm'
